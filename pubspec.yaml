name: smart_learn
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.6

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # Navigation
  go_router: ^17.2.0

  # Networking
  dio: ^5.9.2
  retrofit: ^4.9.2
  json_annotation: ^4.11.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Functional Programming
  dartz: ^0.10.1

  # UI
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0

  # Localization
  easy_localization: ^3.0.7

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Local Storage
  shared_preferences: ^2.3.5

  # Image Picker
  image_picker: ^1.1.2

  # Text-to-Speech
  flutter_tts: ^4.2.5

  # Utils
  logger: ^2.5.0
  collection: ^1.19.1
  cached_network_image: ^3.4.1
  toastification: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

  # Testing
  glados: ^1.1.1
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

  # Code Generation
  build_runner: ^2.4.15
  retrofit_generator: ^10.2.5
  injectable_generator: ^2.7.0  
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_logo.png
