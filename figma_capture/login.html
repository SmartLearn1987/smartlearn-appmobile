<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440, initial-scale=1.0">
  <title>Smart Learn - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Quicksand', sans-serif; background: #F9F7F3; }

    .login-screen {
      width: 1440px; height: 900px;
      position: relative; overflow: hidden;
      background: #F9F7F3;
    }

    .blob-tr {
      position: absolute; top: -100px; right: 140px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(45, 155, 99, 0.08);
      filter: blur(80px);
    }

    .blob-bl {
      position: absolute; bottom: -50px; left: -50px;
      width: 350px; height: 350px;
      border-radius: 50%;
      background: rgba(240, 148, 62, 0.08);
      filter: blur(80px);
    }

    .center-wrap {
      position: absolute; top: 80px; left: 510px;
      width: 420px;
      display: flex; flex-direction: column;
      align-items: center; gap: 24px;
    }

    .logo-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
    }

    .icon-bg {
      width: 64px; height: 64px;
      background: rgba(192, 132, 71, 0.09);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
    }

    .icon-bg svg { width: 32px; height: 32px; color: #C08447; }

    .app-name {
      font-size: 28px; font-weight: 700; color: #2D9B63;
    }

    .subtitle {
      font-size: 14px; font-weight: 500; color: #9CA3AF;
    }

    .card {
      width: 100%;
      background: #FFFFFF;
      border-radius: 20px;
      border: 1px solid #E3DFD8;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      padding: 32px;
      display: flex; flex-direction: column; gap: 20px;
    }

    .label {
      font-size: 14px; font-weight: 600; color: #222D3F;
    }

    .input-field {
      width: 100%; height: 44px;
      background: #FFFFFF;
      border-radius: 12px;
      border: 1px solid #E3DFD8;
      padding: 0 16px;
      display: flex; align-items: center; gap: 8px;
    }

    .input-field svg { width: 18px; height: 18px; color: #9CA3AF; flex-shrink: 0; }

    .input-field .placeholder {
      font-size: 14px; font-weight: 400; color: #9CA3AF;
      font-family: 'Quicksand', sans-serif;
      flex: 1;
    }

    .login-btn {
      width: 100%; height: 44px;
      background: #2D9B63;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      cursor: pointer;
    }

    .login-btn svg { width: 18px; height: 18px; color: #FFFFFF; }

    .login-btn span {
      font-size: 16px; font-weight: 600; color: #FFFFFF;
      font-family: 'Quicksand', sans-serif;
    }

    .register-row {
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }

    .register-row .text {
      font-size: 14px; font-weight: 400; color: #9CA3AF;
    }

    .register-row .link {
      font-size: 14px; font-weight: 600; color: #2D9B63;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="login-screen">
    <div class="blob-tr"></div>
    <div class="blob-bl"></div>

    <div class="center-wrap">
      <div class="logo-wrap">
        <div class="icon-bg">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 7v10"/><path d="M11 7v10"/><path d="m15 7 2 10"/></svg>
        </div>
        <div class="app-name">Smart Learn</div>
        <div class="subtitle">Nền tảng học tập thông minh</div>
      </div>

      <div class="card">
        <div class="label">Email</div>
        <div class="input-field">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <span class="placeholder">you@example.com</span>
        </div>

        <div class="label">Mật khẩu</div>
        <div class="input-field">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span class="placeholder">••••••••</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:auto"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
        </div>

        <div class="login-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
          <span>Đăng nhập</span>
        </div>

        <div class="register-row">
          <span class="text">Chưa có tài khoản?</span>
          <span class="link">Đăng ký</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
